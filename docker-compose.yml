version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
     # - /app/prisma/dev.db # Persiste o banco de dados SQLite
    environment:
      NODE_ENV: development
      JWT_SECRET: "cauanzin23."
      DATABASE_URL: "https://icbqadwcizpyrztbjskv.supabase.co"
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:3000 # Acessa o backend pelo nome do serviço no Docker
    command: npm run dev